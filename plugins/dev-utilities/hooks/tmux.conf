# managed:claude-tmux-state
# Auto-installed by dev-utilities plugin. Manual edits will be overwritten.
# Palette: gloam (from neovim/lazyvim config)

# Always show status bar
set -g status on

# Status bar style (gloam)
set -g status-style "bg=#1d1e21,fg=#d4cbb8"
set -g status-position bottom

# Left: session name
set -g status-left "#[fg=#d4cbb8,bold] #{session_name}  #[default]"
set -g status-left-length 30

# Disable automatic window renaming (prevents branch names like "(main)")
set -g automatic-rename off

# Window list — Claude state dots embedded per-window
set -g window-status-separator ""
set -g window-status-format "#[fg=#1d1e21,bg=#2d2f33]#[fg=#b0a898,bg=#2d2f33] #W#(~/.tmux/claude-status.sh '#{window_id}') #[fg=#2d2f33,bg=#1d1e21]"
set -g window-status-current-format "#[fg=#1d1e21,bg=#4a4d55]#[fg=#e2d9c6,bg=#4a4d55,bold] #W#(~/.tmux/claude-status.sh '#{window_id}') #[fg=#4a4d55,bg=#1d1e21]"

# Right: clock only
set -g status-right "#[fg=#2d2f33]#[bg=#2d2f33,fg=#b0a898] %H:%M "
set -g status-right-length 20
set -g status-interval 2
