# managed:claude-tmux-state
# Auto-installed by dev-utilities plugin. Manual edits will be overwritten.

# Always show status bar
set -g status on

# Status bar style (Catppuccin Mocha)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-position bottom

# Left: session name
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #{session_name} #[bg=#1e1e2e,fg=#89b4fa]"
set -g status-left-length 30

# Window list — Claude state dots embedded per-window
set -g window-status-separator ""
set -g window-status-format "#[fg=#1e1e2e,bg=#313244]#[fg=#bac2de,bg=#313244] #I  #W#(~/.tmux/claude-status.sh '#{window_id}')#[fg=#bac2de] #[fg=#313244,bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#1e1e2e,bg=#45475a]#[fg=#a6e3a1,bg=#45475a,bold] #I  #W#(~/.tmux/claude-status.sh '#{window_id}')#[fg=#a6e3a1] #[fg=#45475a,bg=#1e1e2e]"

# Right: clock only
set -g status-right "#[fg=#45475a]#[bg=#45475a,fg=#bac2de] %H:%M "
set -g status-right-length 20
set -g status-interval 2
